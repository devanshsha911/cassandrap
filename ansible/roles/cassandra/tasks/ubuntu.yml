- name: Install Python dependencies
  apt:
    name:
      - python3
      - python3-pip
      - python3-venv
    state: present
    update_cache: yes

- name: Create virtual environment for cqlsh
  command: python3 -m venv /opt/cqlsh-env
  args:
    creates: /opt/cqlsh-env

- name: Install cqlsh
  shell: |
    . /opt/cqlsh-env/bin/activate
    pip install cqlsh
